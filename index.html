<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>当黑暗亲吻你</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #0b0b0c;
      color: #ededed;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      color: #8a8a8f;
      margin-top: 6px;
    }

    .tag {
      margin-top: 10px;
      font-size: 11px;
      color: #8a8a8f;
    }

    .character-box {
      margin-top: 20px;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
    }

    .character-box img {
      width: 100%;
      height: 420px;
      object-fit: cover;
    }

    .panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    .stats {
      font-size: 13px;
      line-height: 1.8;
      color: #cfcfd3;
    }

    .dialogue {
      min-height: 60px;
      font-size: 15px;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #444;
      background: transparent;
      color: #fff;
    }

    button:disabled {
      opacity: 0.4;
    }

    .small {
      font-size: 12px;
      color: #8a8a8f;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1a1a1d;
      color: #fff;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">当黑暗亲吻你</div>
  <div class="subtitle">他在黑暗中学会因你而变化</div>
  <div class="tag">试玩版 · 病弱禁欲型</div>

  <div class="character-box">
    <img id="characterImage" src="https://picsum.photos/480/720?grayscale">
  </div>

  <div class="panel stats">
    好感度：<span id="affinity">0</span>/100<br>
    同步率：<span id="sync">3</span>%<br>
    状态：<span id="status">警惕</span><br>
    糖果：<span id="candy">1</span>
  </div>

  <div class="panel dialogue" id="dialogue">
    ……你是谁？这里不是你该来的地方。
  </div>

  <div class="panel">
    <div>每日奖励</div>
    <div class="small">今天可以领取一颗糖。</div>
    <button onclick="claimCandy()">领取今日糖果</button>
  </div>

  <div class="panel">
    <div>今日互动</div>
    <div class="small">剩余次数：<span id="remaining">5</span></div>

    <div class="buttons">
      <button onclick="talk()">聊天</button>
      <button onclick="touch()">触碰</button>
      <button onclick="approach()">靠近</button>
      <button onclick="giveCandy()">喂他糖</button>
    </div>

    <input id="userInput" placeholder="你想对他说什么…">
    <button onclick="sendMessage()">发送</button>
  </div>

  <div class="small" style="margin-top:15px;text-align:center;">
    正式版游玩即将开放
  </div>

</div>

<script>
let affinity = 0;
let sync = 3;
let candy = 1;
let remaining = 5;
let claimed = false;

function getStatus(){
  if(affinity>=25) return "依赖";
  if(affinity>=10) return "动摇";
  return "警惕";
}

function update(){
  document.getElementById("affinity").innerText = affinity;
  document.getElementById("sync").innerText = sync;
  document.getElementById("candy").innerText = candy;
  document.getElementById("remaining").innerText = remaining;
  document.getElementById("status").innerText = getStatus();
}

function spend(){
  if(remaining<=0){
    document.getElementById("dialogue").innerText="他今天已经很疲惫了，明天再来见他。";
    return false;
  }
  remaining--;
  return true;
}

function talk(){
  if(!spend()) return;
  affinity+=1;
  document.getElementById("dialogue").innerText="……别和我说太多话。";
  update();
}

function touch(){
  if(!spend()) return;
  affinity+=2;
  sync+=1;
  document.getElementById("dialogue").innerText="别碰我……";
  update();
}

function approach(){
  if(!spend()) return;
  affinity+=3;
  document.getElementById("dialogue").innerText="你为什么还不走？";
  update();
}

function giveCandy(){
  if(candy<=0){
    document.getElementById("dialogue").innerText="你没有糖了。";
    return;
  }
  if(!spend()) return;
  candy--;
  affinity+=5;
  sync+=2;
  document.getElementById("dialogue").innerText="……给我的？";
  update();
}

function claimCandy(){
  if(claimed) return;
  candy++;
  claimed=true;
  document.getElementById("dialogue").innerText="你悄悄放了一颗糖。他注意到了。";
  update();
}

function sendMessage(){
  let input=document.getElementById("userInput").value;

  if(input.includes("为什么")){
    reply="……这不是你该知道的事。";
  }else if(input.includes("喜欢")){
    reply="你不应该问这种问题。";
  }else{
    reply="……我不确定该怎么回答你。";
  }

  document.getElementById("dialogue").innerText=reply;
}

update();
</script>

</body>
</html>
