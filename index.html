<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When Dark Kisses You — Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0b0c;
      color: #ededed;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-top: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #8a8a8f;
      margin-top: 6px;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      color: #8a8a8f;
      border: 1px solid #2c2c31;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .character-box {
      margin-top: 22px;
      border-radius: 18px;
      overflow: hidden;
      background: #121214;
      border: 1px solid #1f1f23;
    }

    .character-box img {
      display: block;
      width: 100%;
      height: 420px;
      object-fit: cover;
    }

    .panel {
      margin-top: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px;
    }

    .stats {
      font-size: 13px;
      line-height: 1.9;
      color: #c9c9cf;
    }

    .dialogue {
      min-height: 68px;
      font-size: 15px;
      line-height: 1.7;
      color: #f1f1f2;
    }

    .reward-row,
    .limit-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #444;
      background: transparent;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255,255,255,0.04);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .small {
      font-size: 12px;
      color: #8a8a8f;
    }

    .coming {
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #8a8a8f;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">When Dark Kisses You</div>
    <div class="subtitle">Demo Build — He learned color from you.</div>
    <div class="tag">病弱禁欲型 Demo</div>

    <div class="character-box">
      <img id="characterImage" src="https://picsum.photos/480/720?grayscale" alt="character" />
    </div>

    <div class="panel stats">
      Affinity: <span id="affinity">0</span>/100<br>
      Sync: <span id="sync">3</span>%<br>
      Status: <span id="status">Guarded</span><br>
      Candy: <span id="candy">1</span>
    </div>

    <div class="panel dialogue" id="dialogue">
      ……你是谁？这里不是你该来的地方。
    </div>

    <div class="panel">
      <div class="reward-row">
        <div>
          <div>Daily Reward</div>
          <div class="small">Claim one candy for today.</div>
        </div>
        <button id="claimBtn" onclick="claimCandy()">Claim Daily Candy</button>
      </div>
    </div>

    <div class="panel">
      <div class="limit-row">
        <div>
          <div>Daily Interaction</div>
          <div class="small">You can interact 5 times today.</div>
        </div>
        <div class="small">Remaining: <span id="remaining">5</span></div>
      </div>

      <div class="buttons">
        <button id="talkBtn" onclick="talk()">Talk</button>
        <button id="touchBtn" onclick="touch()">Touch</button>
        <button id="approachBtn" onclick="approach()">Approach</button>
        <button id="candyBtn" onclick="giveCandy()">Give Candy</button>
      </div>
    </div>

    <div class="coming">
      Full Game Coming Soon
    </div>
  </div>

  <script>
    let affinity = 0;
    let sync = 3;
    let candy = 1;
    let remaining = 5;
    let claimedToday = false;

    const images = {
      guarded: "https://picsum.photos/480/720?grayscale",
      wavering: "https://picsum.photos/481/720?grayscale",
      attached: "https://picsum.photos/482/720"
    };

    function getStatus() {
      if (affinity >= 25) return "Attached";
      if (affinity >= 10) return "Wavering";
      return "Guarded";
    }

    function getDialogue(action) {
      const status = getStatus();

      const lines = {
        Guarded: {
          talk: "……别和我说太多话。我不习惯有人停留。",
          touch: "别碰我……你不知道这意味着什么。",
          approach: "你为什么还不走？",
          candy: "给我的？……你没必要这样。"
        },
        Wavering: {
          talk: "你每天都来。……你不觉得麻烦吗。",
          touch: "你这样会让我误会。",
          approach: "再靠近一点，我可能就没办法装作不在意了。",
          candy: "原来你真的记得我喜欢甜的。"
        },
        Attached: {
          talk: "今天也会陪我吗？",
          touch: "……别这样。我会开始依赖你。",
          approach: "你靠近的时候，我会忘记这里有多冷。",
          candy: "下次……还能再给我一颗吗？"
        }
      };

      return lines[status][action];
    }

    function updateCharacter() {
      const status = getStatus();
      const img = document.getElementById("characterImage");

      if (status === "Guarded") img.src = images.guarded;
      if (status === "Wavering") img.src = images.wavering;
      if (status === "Attached") img.src = images.attached;
    }

    function updateUI() {
      document.getElementById("affinity").innerText = affinity;
      document.getElementById("sync").innerText = sync;
      document.getElementById("candy").innerText = candy;
      document.getElementById("remaining").innerText = remaining;
      document.getElementById("status").innerText = getStatus();

      if (claimedToday) {
        document.getElementById("claimBtn").disabled = true;
      }

      if (remaining <= 0) {
        document.getElementById("talkBtn").disabled = true;
        document.getElementById("touchBtn").disabled = true;
        document.getElementById("approachBtn").disabled = true;
        document.getElementById("candyBtn").disabled = true;
        document.getElementById("dialogue").innerText =
          "He looks exhausted today. Come back tomorrow.";
      }

      updateCharacter();
    }

    function spendAction() {
      if (remaining <= 0) return false;
      remaining -= 1;
      return true;
    }

    function talk() {
      if (!spendAction()) return;
      affinity += 1;
      document.getElementById("dialogue").innerText = getDialogue("talk");
      updateUI();
    }

    function touch() {
      if (!spendAction()) return;
      affinity += 2;
      sync += 1;
      document.getElementById("dialogue").innerText = getDialogue("touch");
      updateUI();
    }

    function approach() {
      if (!spendAction()) return;
      affinity += 3;
      sync += 1;
      document.getElementById("dialogue").innerText = getDialogue("approach");
      updateUI();
    }

    function giveCandy() {
      if (candy <= 0) {
        document.getElementById("dialogue").innerText = "You don't have any candy left.";
        return;
      }
      if (!spendAction()) return;
      candy -= 1;
      affinity += 5;
      sync += 2;
      document.getElementById("dialogue").innerText = getDialogue("candy");
      updateUI();
    }

    function claimCandy() {
      if (claimedToday) return;
      candy += 1;
      claimedToday = true;
      document.getElementById("dialogue").innerText =
        "You quietly placed a candy beside him. He noticed.";
      updateUI();
    }

    updateUI();
  </script>
</body>
</html>
