<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>当黑暗亲吻你</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title">当黑暗亲吻你</div>
      <div class="subtitle">Demo v5 · 结构拆分中</div>
    </header>

    <main class="scene">
      <div class="character-area">
        <img id="characterImage" src="https://picsum.photos/480/720?grayscale" alt="角色图">
        <div class="dialogue-overlay">
          <div id="dialogueText">……你是谁？这里不是你该来的地方。</div>
        </div>
      </div>

      <section class="status-bar">
        <div>好感度：<span id="affinity">0</span>/100</div>
        <div>同步率：<span id="sync">3</span>%</div>
        <div>状态：<span id="status">警惕</span></div>
        <div>糖果：<span id="candy">1</span></div>
      </section>

      <section class="actions">
        <div class="action-row">
          <button id="talkBtn">聊天</button>
          <button id="touchBtn">触碰</button>
          <button id="approachBtn">靠近</button>
          <button id="candyBtn">喂糖</button>
        </div>

        <div class="input-row">
          <input id="userInput" placeholder="你想对他说什么……">
          <button id="sendBtn">发送</button>
        </div>
      </section>
    </main>
  </div>

  <script src="story.js"></script>
  <script src="script.js"></script>
</body>
</html>
