<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>When Dark Kisses You</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0B0B0C;
  color: #EDEDED;
}
.container {
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
}
.title {
  font-size: 22px;
  font-weight: 500;
}
.subtitle {
  font-size: 12px;
  color: #8A8A8F;
  margin-top: 6px;
}
.character {
  position: relative;
  margin-top: 30px;
  height: 420px;
  border-radius: 18px;
  overflow: hidden;
  background: #111;
}
.character img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.color {
  opacity: 0.15;
  transition: opacity 0.5s ease;
}
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.15), rgba(0,0,0,0.5));
  pointer-events: none;
}
.status {
  margin-top: 20px;
  font-size: 13px;
  line-height: 1.9;
  color: #8A8A8F;
}
.dialogue {
  margin-top: 20px;
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: 12px;
  min-height: 54px;
}
.input-area {
  margin-top: 20px;
}
input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1A1A1D;
  color: white;
  outline: none;
}
.buttons {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}
button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #444;
  background: transparent;
  color: white;
  cursor: pointer;
}
button:hover {
  background: rgba(255,255,255,0.04);
}
.tip {
  margin-top: 14px;
  font-size: 12px;
  color: #8A8A8F;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">When Dark Kisses You</div>
  <div class="subtitle">He learned color from you.</div>

  <div class="character">
    <img src="https://picsum.photos/480/720?grayscale" id="bw" alt="black and white character">
    <img src="https://picsum.photos/480/720" class="color" id="color" alt="color character">
    <div class="overlay"></div>
  </div>

  <div class="status">
    Affinity: <span id="aff">0</span>/100<br>
    Status: <span id="statusText">Guarded</span><br>
    Sync: <span id="sync">3</span>%
  </div>

  <div class="dialogue" id="dialogue">……你是谁？</div>

  <div class="input-area">
    <input id="userInput" placeholder="和他说一句话…" />
    <div class="buttons">
      <button onclick="touch()">Touch</button>
      <button onclick="approach()">Approach</button>
    </div>
    <div class="tip">先点按钮试玩，后面再接 AI 聊天。</div>
  </div>
</div>

<script>
let affinity = 0;
let sync = 3;

function update() {
  document.getElementById("aff").innerText = affinity;
  document.getElementById("sync").innerText = sync;
  document.getElementById("color").style.opacity = Math.min(0.15 + affinity / 150, 0.95);
}

function touch() {
  affinity += 5;
  sync += 2;
  document.getElementById("statusText").innerText = "Shaken";
  document.getElementById("dialogue").innerText = "……别碰我。";
  update();
}

function approach() {
  affinity += 3;
  sync += 1;
  document.getElementById("statusText").innerText = "Watching You";
  document.getElementById("dialogue").innerText = "你为什么还不走？";
  update();
}
</script>
</body>
</html>
